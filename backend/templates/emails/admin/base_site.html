{% extends "admin/base_site.html" %}

{% block footer %}
  {{ block.super }}

  <script>
    (function() {
      function fixJQuery() {
        if (window.django && django.jQuery) {
          window.$ = django.jQuery;
          window.jQuery = django.jQuery;
        } else {
          setTimeout(fixJQuery, 50);
        }
      }
      fixJQuery();
    })();
  </script>
{% endblock %}
